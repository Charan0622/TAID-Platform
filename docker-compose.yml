# docker-compose.yml — Defines all containerized services for the platform.
# Phase 2: Kafka | Phase 3: + MinIO | Phase 4: + Airflow
#
# Usage:
#   docker compose up kafka minio -d              ← ingestion/processing work
#   docker compose up kafka minio airflow -d      ← pipeline orchestration work
#   docker compose down                            ← stop everything

services:
  kafka:
    # Official Apache Kafka image — ARM64 compatible, includes KRaft mode
    # so we don't need a separate ZooKeeper container (saves ~500MB RAM)
    image: apache/kafka:3.9.0
    platform: linux/arm64            # REQUIRED: we're on Apple Silicon M4
    container_name: kafka
    ports:
      - "9092:9092"                  # Expose Kafka's broker port to localhost
    environment:
      # --- KRaft mode configuration (no ZooKeeper needed) ---
      # CLUSTER_ID: a unique ID for this Kafka cluster (required for KRaft mode)
      # Any 22-character base64 string works — this is just a dev cluster
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # Node ID: unique identifier for this broker (we only have one)
      KAFKA_NODE_ID: 0
      # This single node acts as BOTH broker (handles messages) AND controller (manages cluster)
      KAFKA_PROCESS_ROLES: broker,controller
      # LISTENERS: the network interfaces Kafka listens on
      #   PLAINTEXT://:29092  — internal listener (for inter-container traffic in later phases)
      #   CONTROLLER://:9093  — for internal cluster coordination (KRaft protocol)
      #   PLAINTEXT_HOST://:9092 — external listener (for our Python code on localhost)
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      # ADVERTISED_LISTENERS: the addresses Kafka tells clients to connect to
      #   kafka:29092   — other Docker containers use the container hostname
      #   localhost:9092 — our Python scripts connect via localhost
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      # Map each listener name to a security protocol (all plaintext for local dev)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # Which listener to use for broker-to-broker communication
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Which node votes in the KRaft quorum — just node 0 (us) on port 9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      # Tell Kafka which listener name is for controller traffic
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Auto-create topics when a producer first sends to them
      # (convenient for dev — in production you'd create topics explicitly)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    # Hard cap at 1GB RAM — Kafka is efficient but can grow if unchecked
    mem_limit: 1g
    # Restart automatically if it crashes (but not if we manually stop it)
    restart: unless-stopped

  minio:
    # MinIO — S3-compatible object storage that runs locally.
    # Iceberg tables store their data files (Parquet) here, organized in "buckets."
    # Think of it as your personal Amazon S3 on your laptop.
    image: minio/minio:latest
    platform: linux/arm64            # REQUIRED: Apple Silicon M4
    container_name: minio
    ports:
      - "9000:9000"                  # S3 API port (Spark/Iceberg connect here)
      - "9001:9001"                  # Web console (browse files in your browser)
    command: server /data --console-address ":9001"
    environment:
      # Login credentials for MinIO (like AWS access keys, but local)
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    mem_limit: 512m
    restart: unless-stopped

  # One-time helper: creates the storage bucket that Iceberg needs.
  # Runs once, creates the bucket, then exits. Won't fail if bucket already exists.
  minio-setup:
    image: minio/mc:latest           # MinIO Client — CLI tool for managing MinIO
    platform: linux/arm64
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/telemetry-warehouse --ignore-existing &&
      echo 'Bucket telemetry-warehouse created successfully'
      "
    restart: "no"                    # Run once and exit

  airflow:
    # Apache Airflow — workflow orchestrator with a web UI.
    # Schedules and monitors our data pipelines (DAGs).
    # Think of it as a robot manager that runs your scripts on schedule.
    image: apache/airflow:2.9.3-python3.11
    platform: linux/arm64
    container_name: airflow
    ports:
      - "8080:8080"                  # Web UI for monitoring DAGs
    environment:
      # Use SequentialExecutor — runs one task at a time (perfect for laptop)
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      # SQLite database — simple, no separate DB container needed
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      # Don't load example DAGs (they clutter the UI)
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Path where Airflow looks for DAG files
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      # Disable warnings about example DAGs not loading
      AIRFLOW__CORE__UNIT_TEST_MODE: "false"
      # Web server auth — simple user/password for local dev
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      # Secret key for web session encryption
      AIRFLOW__WEBSERVER__SECRET_KEY: "local-dev-secret-key"
      # Faster DAG parsing for development
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 30
    volumes:
      # Mount our DAGs folder into the container so Airflow can see them
      - ./infra/airflow/dags:/opt/airflow/dags
    # Initialize the DB, create an admin user, then start both scheduler and webserver
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@local.dev 2>/dev/null || true &&
      airflow scheduler &
      airflow webserver --port 8080
      "
    mem_limit: 1536m                 # 1.5GB — Airflow needs room for scheduler + webserver
    restart: unless-stopped
